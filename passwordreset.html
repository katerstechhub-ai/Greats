<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center gap-8 py-4">
                <!-- Logo -->
                <a href="./index.html">
                    <div class="text-2xl hidden sm:block font-bold text-gray-800 tracking-tight">GREATS</div>
                </a>

                <!-- Navigation -->
                <nav>
                    <ul class="flex  items-center space-x-8">
                        <li><a href="./shop.html" class="text-black text-sm ">NEW</a></li>
                        <li><a href="./productkingston.html" class="text-black text-sm ">MEN</a></li>
                        <li><a href="#" class="text-black text-sm ">WOMEN</a></li>
                        <li><a href="#" class="text-black text-sm ">OUR STORY</a></li>
                        <li><a href="" class="text-red-500 text-sm ">SALE</a></li>
                    </ul>
                </nav>

                <!-- Icons -->
                <div class="flex items-center space-x-4 ml-auto">
                    <!-- Search icon -->
                    <a href="#" class="text-gray-600 hidden sm:block hover:text-gray-900">
                        <img src="./Home.img/search-interface-symbol.png" alt="Search" class="w-5 h-5">
                    </a>
                    <!-- User icon -->
                    <a href="./login.html" class="text-gray-600 hover:text-gray-900">
                        <img src="./Home.img/user.png" alt="User" class="w-5 h-5">
                    </a>

                    <a href="#" class="text-gray-600 hover:text-gray-900">
                        <img src="./Home.img/market.png" alt="Shopping bag" class="w-5 h-5">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <div class=" flex items-center justify-center min-h-screen p-4">
        <div class="max-w-md w-full bg-white p-8 md:p-10">
            <h1 class="text-xl text-center text-gray-800 mb-6">FORGOT PASSWORD</h1>

            <p class="text-sm text-black text-center mb-6">
                Enter the email address for your account and we'll send you an
                email with instructions for resetting your password.
            </p>

            <!-- Error div (hidden by default, shown when email is empty) -->
            <div id="errorMessage"
                class="hidden mt-4 mb-4 bg-red-800 text-white text-sm text-center font-medium w-full px-2 py-2.5 ">
                No account found with that email.
            </div>

            <div class="mb-5">
                <input type="email" id="email"
                    class="w-full px-2 py-2.5 border border-gray-300 bg-gray-50 focus:bg-white focus:border-blue-500 outline-none focus:ring-2 focus:ring-blue-200"
                    placeholder="email">
            </div>

            <button id="forgotBtn"
                class="w-full bg-black hover:bg-gray-900 cursor-pointer text-white font-semibold py-2.5 shadow-md transition">
                FORGOT PASSWORD
            </button>

            <div class="border-b border-gray-300 mt-8"></div>

            <div class="mt-6 text-center text-sm">
                <span class="text-gray-700">Don't have an account?</span>
                <a href="#" class="text-black hover:underline ml-1">Sign up</a>
            </div>

            <div class="text-center mt-4 text-sm">
                <a href="./login.html" class="text-black hover:underline">Login</a>
            </div>
        </div>
    </div>
</body>
<script src="./passwordreset.js"></script>

</html>
