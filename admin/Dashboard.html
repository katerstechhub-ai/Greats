<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body class="bg-gray-50">
    <div class="grid grid-cols-5 min-h-screen">
        <!-- Sidebar -->
        <div class="col-span-1 bg-white border-r border-gray-200">
            <div class="p-6 border-b border-gray-200">
                <h2 class="text-xl font-bold text-gray-800">Gre@ts</h2>
                <p class="text-sm text-gray-500">Admin Dashboard</p>
            </div>
            <ul class="py-4">
                <li>
                    <a href="./Dashboard.html"
                        class="block px-6 py-3 text-gray-700 hover:bg-gray-100 hover:text-blue-600 transition">
                        <i class="fas fa-tachometer-alt mr-2"></i>Dashboard
                    </a>
                </li>
                <li>
                    <a href="./productadmin.html"
                        class="block px-6 py-3 text-gray-700 hover:bg-gray-100 text-blue-600 transition">
                        <i class="fas fa-box mr-2"></i>Products
                    </a>
                </li>
                <li>
                    <a href="./createproduct.html"
                        class="block px-6 py-3 text-gray-700 hover:bg-gray-100 hover:text-blue-600 transition">
                        <i class="fas fa-plus-circle mr-2"></i>Create product
                    </a>
                </li>
                <li>
                    <a href="./createcategory.html"
                        class="block px-6 py-3 text-gray-700 hover:bg-gray-100 hover:text-blue-600 transition">
                        <i class="fas fa-tags mr-2"></i>Create category
                    </a>
                </li>
                <li>
                    <a href="#" class="block px-6 py-3 text-gray-700 hover:bg-gray-100 hover:text-blue-600 transition">
                        <i class="fas fa-users mr-2"></i>Users
                    </a>
                </li>
                <li>
                    <a href="#" class="block px-6 py-3 text-gray-700 hover:bg-gray-100 hover:text-blue-600 transition">
                        <i class="fas fa-shopping-cart mr-2"></i>Cart
                    </a>
                </li>
            </ul>
            <div class="absolute bottom-0 w-full p-6 border-t border-gray-200">
                <a href="#" id="signOutBtn" class="block text-gray-600 hover:text-red-500 transition">
                    <i class="fas fa-sign-out-alt mr-2"></i>Sign Out
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-span-4 p-6">
            <!-- Header -->
            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Dashboard</h1>
                <p class="text-gray-500">Welcome back, Admin</p>
            </div>

            <!-- Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white rounded-lg shadow-sm border-t-4 border-blue-500 p-6">
                    <h3 class="text-gray-500 text-sm font-medium">Total Products</h3>
                    <p class="text-3xl font-bold text-gray-800 mt-2" id="totalProducts">0</p>
                </div>
                <div class="bg-white rounded-lg shadow-sm border-t-4 border-green-500 p-6">
                    <h3 class="text-gray-500 text-sm font-medium">Total Users</h3>
                    <p class="text-3xl font-bold text-gray-800 mt-2" id="totalUsers">0</p>
                </div>
                <div class="bg-white rounded-lg shadow-sm border-t-4 border-orange-500 p-6">
                    <h3 class="text-gray-500 text-sm font-medium">Products in Cart</h3>
                    <p class="text-3xl font-bold text-gray-800 mt-2" id="totalCartItems">0</p>
                </div>
            </div>

            <!-- Products Table -->
            <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-800">Recent Products (Top 10)</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    S/N</th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Product Name</th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Price</th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Category</th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Stock</th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Status</th>
                            </tr>
                        </thead>
                        <tbody id="productTableBody" class="bg-white divide-y divide-gray-200">
                            <!-- Rows will be injected here -->
                            <tr>
                                <td colspan="6" class="px-6 py-4 text-center text-gray-500">Loading products...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>


</body>
<script src="Dashboard.js"></script>

</html>
