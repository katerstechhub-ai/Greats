<!DOCTYPE html>
<html>

<head>
    <title>Merchant Test</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }

        .section {
            border: 1px solid #ccc;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        input,
        button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 8px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }

        pre {
            background: #f4f4f4;
            padding: 10px;
            overflow: auto;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <h1>Merchant API Test</h1>

    <div class="section">
        <h2>Register</h2>
        <form id="registerForm">
            <input type="text" id="regFirstName" placeholder="First Name" required>
            <input type="text" id="regLastName" placeholder="Last Name" required>
            <input type="email" id="regEmail" placeholder="Email" required>
            <input type="text" id="regPhone" placeholder="Phone" required>
            <input type="text" id="regStoreName" placeholder="Store Name" required>
            <input type="password" id="regPassword" placeholder="Password" required>
            <textarea id="regDescp" placeholder="Description"></textarea>
            <button type="submit">Register</button>
        </form>
        <div id="regResult"></div>
    </div>

    <div class="section">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div id="errorMsg"></div>
        <div id="loginResult"></div>
    </div>

    <script>
        const API_BASE = 'http://ecommerce.reworkstaging.name.ng/v2';

        // Registration
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('regResult');
            resultDiv.innerHTML = '<em>Registering...</em>';

            const payload = {
                first_name: document.getElementById('regFirstName').value.trim(),
                last_name: document.getElementById('regLastName').value.trim(),
                email: document.getElementById('regEmail').value.trim(),
                phone: document.getElementById('regPhone').value.trim(),
                store_name: document.getElementById('regStoreName').value.trim(),
                password: document.getElementById('regPassword').value,
                descp: document.getElementById('regDescp').value.trim() || '',
                icon: '',
                banner: '',
                // Important: send a phones array with at least one number
                phones: [parseInt(document.getElementById('regPhone').value.trim())] || [1234567890]
            };

            try {
                const response = await fetch(`${ API_BASE }/merchants`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const text = await response.text();
                let parsed;
                try { parsed = JSON.parse(text); } catch (e) { parsed = text; }
                resultDiv.innerHTML = `
                    <strong>Status:</strong> ${response.status}<br>
                    <strong>Response:</strong><br>
                    <pre>${JSON.stringify(parsed, null, 2)}</pre>
                `;
                if (response.ok) {
                    resultDiv.innerHTML += `<span class="success">✓ Registration successful! Now try to login.</span>`;
                } else {
                    resultDiv.innerHTML += `<span class="error">✗ Registration failed. See response above.</span>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<span class="error">Error: ${err.message}</span>`;
            }
        });

 



        

document.addEventListener('DOMContentLoaded', () => {
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');

    if (!loginForm || !errorMsg) {
        console.error('Missing required elements: form or error message');
        return;
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        errorMsg.textContent = '';

        try {
            const response = await fetch(`${API_BASE}/merchants/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();
            console.log('Login response:', data);

            // Check for error message (API may return 200 but with error inside)
            if (data.msg === 'Invalid credential' || data.type === 'INVALID_CREDENTIAL') {
                throw new Error('Invalid email or password. Please try again.');
            }

            // Extract merchant ID – the response has 'id'
            let merchantId = null;
            if (data.id) {
                merchantId = data.id;
            } else if (data.merchant_id) {
                merchantId = data.merchant_id;
            }

            if (!merchantId) {
                console.error('Could not find merchant ID in response:', data);
                throw new Error('Unable to extract merchant ID from response.');
            }

            // The API does not return a token; we'll store the merchant ID as the token.
            // If your product creation page expects a real token, you may need to adjust.
            const token = merchantId;

            localStorage.setItem('merchantId', merchantId);
            localStorage.setItem('authToken', token);

            // Redirect to dashboard (adjust path if needed)
            window.location.href = 'Dashboard.html';
        } catch (err) {
            errorMsg.textContent = err.message;
            console.error(err);
        }
    });
})
    </script>
</body>

</html>
