<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Category | MoniTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body class="bg-gray-50">
    <div class="grid grid-cols-5 min-h-screen">
        <!-- Sidebar (consistent with other admin pages) -->
        <div class="col-span-1 bg-white border-r border-gray-200">
            <div class="p-6 border-b border-gray-200">
                <h2 class="text-xl font-bold text-gray-800">Gre@ts</h2>
                <p class="text-sm text-gray-500">Admin Dashboard</p>
            </div>
            <ul class="py-4">
                <li>
                    <a href="./Dashboard.html"
                        class="block px-6 py-3 text-gray-700 hover:bg-gray-100 hover:text-blue-600 transition">
                        <i class="fas fa-tachometer-alt mr-2"></i>Dashboard
                    </a>
                </li>
                <li>
                    <a href="./productadmin.html"
                        class="block px-6 py-3 text-gray-700 hover:bg-gray-100 text-blue-600 transition">
                        <i class="fas fa-box mr-2"></i>Products
                    </a>
                </li>
                <li>
                    <a href="./createproduct.html"
                        class="block px-6 py-3 text-gray-700 hover:bg-gray-100 hover:text-blue-600 transition">
                        <i class="fas fa-plus-circle mr-2"></i>Create product
                    </a>
                </li>
                <li>
                    <a href="./createcategory.html"
                        class="block px-6 py-3 text-gray-700 hover:bg-gray-100 hover:text-blue-600 transition">
                        <i class="fas fa-tags mr-2"></i>Create category
                    </a>
                </li>
                <li>
                    <a href="#" class="block px-6 py-3 text-gray-700 hover:bg-gray-100 hover:text-blue-600 transition">
                        <i class="fas fa-users mr-2"></i>Users
                    </a>
                </li>
                <li>
                    <a href="#" class="block px-6 py-3 text-gray-700 hover:bg-gray-100 hover:text-blue-600 transition">
                        <i class="fas fa-shopping-cart mr-2"></i>Cart
                    </a>
                </li>
            </ul>
            <div class="absolute bottom-0 w-full p-6 border-t border-gray-200">
                <a href="#" id="signOutBtn" class="block text-gray-600 hover:text-red-500 transition">
                    <i class="fas fa-sign-out-alt mr-2"></i>Sign Out
                </a>
            </div>
        </div>


        <!-- Main Content -->
        <div class="col-span-4 p-6">
            <div class="bg-white rounded-lg shadow-md p-6 max-w-3xl">
                <h1 class="text-2xl font-bold mb-6">Create New Category</h1>
                <form id="createCategoryForm">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Category Name *</label>
                        <input type="text" id="categoryName" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="e.g., Electronics, Clothing, Unique_12345">
                    </div>
                    <div class="flex justify-end gap-3">
                        <button type="button" id="cancelBtn"
                            class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">Cancel</button>
                        <button type="submit"
                            class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Create
                            Category</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="createcategory.js"></script>
</body>

</html>
