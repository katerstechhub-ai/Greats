<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Login | Gre@ts</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white rounded-lg shadow-lg w-full max-w-md p-8">
        <div class="text-center mb-8">
            <i class="fas fa-store text-5xl text-green-800 mb-3"></i>
            <h1 class="text-3xl font-bold text-gray-800">Gre@ts</h1>
            <p class="text-gray-500 mt-2">Merchant Login</p>
        </div>

        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="email">
                    <i class="fas fa-envelope mr-2"></i>Email
                </label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="merchant@example.com">
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="password">
                    <i class="fas fa-lock mr-2"></i>Password
                </label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="••••••••">
            </div>

            <button type="submit"
                class="w-full bg-green-800 text-white py-2 rounded-lg hover:bg-green-700 transition duration-200 flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <div class="text-center mt-4">
                <span class="text-black text-[15px]">Don't have an account?</span>
                <a href="./registeradmin.html" class="text-black text-[15px] hover:underline ml-1">Register</a>
            </div>
            

            <div id="errorMsg" class="mt-4 text-center text-red-500 text-sm"></div>
        </form>
    </div>

    <script src="loginadmin.js"></script>
</body>

</html>
