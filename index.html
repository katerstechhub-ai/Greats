<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greats</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center gap-8 py-4">
                <!-- Logo -->
                <div class="text-2xl hidden sm:block font-bold text-gray-800 tracking-tight">GREATS</div>

                <!-- Navigation -->
                <nav>
                    <ul class="flex  items-center space-x-8">
                        <li><a href="#" class="text-black text-sm ">NEW</a></li>
                        <li><a href="#" class="text-black text-sm ">MEN</a></li>
                        <li><a href="#" class="text-black text-sm ">WOMEN</a></li>
                        <li><a href="#" class="text-black text-sm ">OUR STORY</a></li>
                        <li><a href="#" class="text-red-500 text-sm ">SALE</a></li>
                    </ul>
                </nav>

                <!-- Icons -->
                <div class="flex items-center space-x-4 ml-auto">
                    <!-- Search icon -->
                    <a href="#" class="text-gray-600 hidden sm:block hover:text-gray-900">
                        <img src="./Home.img/search-interface-symbol.png" alt="Search" class="w-5 h-5">
                    </a>
                    <!-- User icon -->
                    <a href="#" class="text-gray-600 hover:text-gray-900">
                        <img src="./Home.img/user.png" alt="User" class="w-5 h-5">
                    </a>

                    <a href="#" class="text-gray-600 hover:text-gray-900">
                        <img src="./Home.img/market.png" alt="Shopping bag" class="w-5 h-5">
                    </a>
                </div>
            </div>
        </div>
    </header>
    <div id="productcontainer" class="grid grid-cols-1 text-center md:grid-cols-2 lg:grid-cols-2 ">
        <!-- Cards will appear here -->
    </div>



    <!-- Two-column grid section -->
    <div class="grid grid-cols-1 md:grid-cols-2  bg-gray-100 mt-8 mb-6 rounded-[15px] max-w-6xl mx-auto px-18 py-8">
        <!-- Left column: stars + review count -->
        <div class=" ml-20">
            <img src="./Home.img/stars.png" alt="stars" class="w-20  h-20">
            <p class="text-black font-bold text-[20px]">Over 11k </p>
            <p class="text-black font-bold text-[20px]"> 5-star reviews </p>
        </div>

        <!-- Right column: quote + logos -->
        <div class="space-y-8 items-center">
            <p class="text-black text-center items-center italic text-lg leading-relaxed">
                "If you want a sneaker you can be confident looks good at the office or on a date, these are it."
            </p>
            <!-- Logos in a flex row -->
            <div class="flex flex-wrap items-center gap-6">
                <img src="Home.img/1.webp" alt="Equipe" class="h-8  w-auto object-contain">
                <img src="Home.img/2.avif" alt="Word" class="h-8  object-contain">
                <img src="Home.img/3.avif" alt="BUSINESS INSIDER" class="h-8 w-auto object-contain">
                <img src="Home.img/4.webp" alt="BuzzFeed" class="h-8 w-auto object-contain">
            </div>
        </div>
    </div>
    <div class="max-w-6xl mx-auto px-4 mb-2 mt-25 flex items-center justify-between">
        <h2 class="text-2xl font-serif text-gray-900">BEST SELLERS FOR MEN</h2>
        <div class="flex gap-3">
            <a href="#" id="filterLink" class="inline-block">
                <img src="./Home.img/222.png" alt="Filter" class="w-6 h-6 cursor-pointer">
            </a>
            <a href="#" id="gridToggleLink" class="inline-block">
                <img src="./Home.img/right-arrow.png" alt="Grid" class="w-6 h-6 cursor-pointer">
            </a>
        </div>
    </div>
    <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 p-6 "></div>



    <!-- Best Sellers for Women section -->
    <div class="max-w-6xl mx-auto px-4 mb-2 mt-25 flex items-center justify-between">
        <h2 class="text-2xl font-serif text-gray-900">BEST SELLERS FOR WOMEN</h2>
        <div class="flex gap-3">
            <a href="#" id="filterLinkWomen" class="inline-block">
                <img src="./Home.img/222.png" alt="Filter" class="w-6 h-6 cursor-pointer">
            </a>
            <a href="#" id="gridToggleLinkWomen" class="inline-block">
                <img src="./Home.img/right-arrow.png" alt="Grid" class="w-6 h-6 cursor-pointer">
            </a>
        </div>
    </div>

    <!-- Women's product grid container -->
    <div id="product-grid2" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 p-6"></div>


    <!-- Product grid container -->
    <div id="product-grid2" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 p-6 "></div>

    <div id="restock-offer-container" class="container mx-auto w-full  grid grid-cols-1 md:grid-cols-1"></div>

    <div id="category-container" class="grid grid-cols-1 text-center md:grid-cols-2 lg:grid-cols-2 "></div>

    <!-- featured products -->
    <div class="flex max-w-7xl mx-auto px-4  justify-between items-center mt-18">
        <h2 class="text-3xl font-serif">Featured Collections</h2>
        <div class="flex gap-2">
            <button id="featuredMenBtn" class="px-4 py-2 hover:text-black  text-gray-400 cursor-pointer transition">For
                Men</button>
            <button id="featuredWomenBtn"
                class="px-4 py-2 hover:text-black  text-gray-400 cursor-pointer transition">For Women</button>
        </div>
    </div>

    <div id="featured-section-container" class="grid grid-cols-1 p-6 md:grid-cols-1 lg:grid-cols-1"></div>
</body>
<script src="./Home.js"></script>

</html>
